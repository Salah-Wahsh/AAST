# Pointers in C: Lab Guide

## 2. Phase 1: The "WHY"

**Callback to the functions lab:**

\`\`\`c
void swap(int a, int b) {
    int temp = a;
    a = b;
    b = temp;
    printf("Inside swap: a=%d, b=%d\\n", a, b);
}

int main() {
    int x = 5, y = 10;
    swap(x, y);
    printf("In main: x=%d, y=%d\\n", x, y);
    return 0;
}
\`\`\`

\`\`\`
Inside swap: a=10, b=5
In main: x=5, y=10     ← DIDN'T SWAP!
\`\`\`

> **"Remember pass by value from last lab? The function got COPIES. It swapped the copies and the originals didn't change. So... how do we ACTUALLY swap them?"**

> **"We need a way to reach INTO main and change the original variables. That's what pointers do."**

---

## 3. Phase 2: The "WHAT" — Core Concepts

### Memory

\`\`\`
┌──────────┬───────┐
│ Address  │ Value │
├──────────┼───────┤
│ 0x1000   │  5    │  ← int x = 5;
│ 0x1004   │  10   │  ← int y = 10;
│ 0x1008   │ 0x1004│  ← int *ptr = &y;
│ 0x100C   │  ???  │
└──────────┴───────┘
\`\`\`

---

### The Two Operators — \`&\` and \`*\`

#### The \`&\` Operator (Address-of) — "WHERE do you live?"

\`\`\`c
int x = 5;
printf("Value of x: %d\\n", x);     // 5
printf("Address of x: %p\\n", &x);  // 0x7ffc12345678 (some address)
\`\`\`

> **\`&x\` means: "Give me the ADDRESS where x lives"**
>
> Think of it as asking someone: **"What's your home address?"**

**Live demo — show real addresses:**

\`\`\`c
int a = 10, b = 20, c = 30;
printf("a lives at: %p\\n", &a);
printf("b lives at: %p\\n", &b);
printf("c lives at: %p\\n", &c);
\`\`\`

> "The addresses are 4 bytes apart! Because each \`int\` is 4 bytes."

#### The \`*\` Operator (Dereference) — "Go TO that address and look inside"

\`\`\`c
int x = 5;
int *ptr = &x;    // ptr stores the address of x

printf("Address stored in ptr: %p\\n", ptr);   // address of x
printf("Value at that address: %d\\n", *ptr);  // 5
\`\`\`

> **\`*ptr\` means: "Go to the address stored in ptr and give me what's there"**
>
> Think of it as: **"Go to this home address and tell me who's inside."**

---

### Step 3: The Confusing Part — \`*\` Has TWO Meanings

\`\`\`c
int *ptr = &x;   // HERE: * means "I'm DECLARING a pointer"
*ptr = 20;       // HERE: * means "Go TO the address (dereference)"
\`\`\`

| Context | \`*\` Means |
|---|---|
| \`int *ptr = &x;\` | "ptr is a **pointer** to an int" (declaration) |
| \`*ptr = 20;\` | "Go to where ptr points and **change** the value" (dereference) |
| \`printf("%d", *ptr);\` | "Go to where ptr points and **read** the value" (dereference) |

> **"Yes, C reuses the same symbol for two different things. In a declaration, \`*\` creates a pointer. Everywhere else, \`*\` follows the pointer."**

---

### The Complete Picture

\`\`\`c
int x = 5;
int *ptr = &x;
\`\`\`

\`\`\`
VARIABLE    ADDRESS     VALUE
┌──────┬────────────┬─────────┐
│  x   │  0x1000    │    5    │
├──────┼────────────┼─────────┤
│  ptr │  0x1008    │ 0x1000  │  ← stores x's address!
└──────┴────────────┴─────────┘

ptr ──────────→ x
               [5]
\`\`\`


\`\`\`c
int x = 5;
int *ptr = &x;

printf("%d\\n", x);       // 5      (read x directly)
printf("%d\\n", *ptr);    // 5      (read x through pointer)

*ptr = 99;               // change x THROUGH the pointer

printf("%d\\n", x);       // 99!    (x changed!)
printf("%d\\n", *ptr);    // 99     (same thing)
\`\`\`


---

### NOW Solve the Swap Problem (More on that next week)

\`\`\`c
void swap(int *a, int *b) {
    int temp = *a;
    *a = *b;
    *b = temp;
}

int main() {
    int x = 5, y = 10;
    swap(&x, &y);         // pass ADDRESSES, not values
    printf("x=%d, y=%d\\n", x, y);  // x=10, y=5 ✅
    return 0;
}
\`\`\`


---

### Arrays ARE Pointers

\`\`\`c
int arr[] = {10, 20, 30};

printf("arr = %p\\n", arr);         // address of first element
printf("&arr[0] = %p\\n", &arr[0]); // SAME address!
\`\`\`


---

### scanf Finally Makes Sense

\`\`\`c
int age;
scanf("%d", &age);   // WHY &age? Because scanf needs the ADDRESS to modify it!
\`\`\`


> **"You've been using pointers since day one without knowing it!"**

## 4. Common \`&\` and \`*\` Mistakes

### The Golden Rules

\`\`\`
OPERATOR    NAME             MEANING                    EXAMPLE
────────────────────────────────────────────────────────────────
  &         Address-of       "Where does this live?"    &x → address of x
  *         Dereference      "What's at this address?"  *ptr → value at ptr
  *         (declaration)    "This is a pointer"        int *ptr;
\`\`\`

### Mistakes probably you will make

\`\`\`c
// ❌ MISTAKE 1: Forgetting &
int x = 5;
int *ptr = x;        // WRONG! x is 5, not an address
int *ptr = &x;       // ✅ CORRECT

// ❌ MISTAKE 2: Using uninitialized pointer
int *ptr;
*ptr = 10;           // WRONG! ptr points to garbage
// Always initialize: int *ptr = &someVariable;

// ❌ MISTAKE 3: Confusing ptr and *ptr
int x = 5;
int *ptr = &x;
printf("%d\\n", ptr);     // WRONG — prints address as integer
printf("%d\\n", *ptr);    // ✅ prints 5
printf("%p\\n", ptr);     // ✅ prints address properly

// ❌ MISTAKE 4: Wrong type
int x = 5;
float *ptr = &x;    // WRONG! int* and float* don't match
int *ptr = &x;      // ✅ CORRECT

// ❌ MISTAKE 5: Double & or double *
int x = 5;
int *ptr = &&x;     // ❌ Nonsense
\`\`\`

### Quick Reference Table

\`\`\`
int x = 5;
int *ptr = &x;

x       →  5           (the value)
&x      →  0x1000      (the address of x)
ptr     →  0x1000      (same as &x)
*ptr    →  5           (same as x)
&ptr    →  0x1008      (address of ptr itself)
\`\`\`

> **"If you can read this table and understand every line, you understand pointers."**

int main() {

    int n = 5;
    int *start = arr;          
    int *end = arr + (n - 1);
