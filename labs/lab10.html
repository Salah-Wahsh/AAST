# Strings in C

---

## 1. What Is a String in C?

> **There is no \`string\` type.** A string is a **char array** that ends with \`\\0\` (the null terminator).

\`\`\`c
char name[] = "Hello";
\`\`\`

\`\`\`
Index:    [0]  [1]  [2]  [3]  [4]  [5]
Value:     'H'  'e'  'l'  'l'  'o'  '\\0'
ASCII:      72  101  108  108  111    0
\`\`\`

> **\`\\0\` is the null terminator.** Every string function stops reading when it hits \`\\0\`.

\`\`\`c
char word[5] = "Hello";  // ❌ BUG! No room for \\0
char word[6] = "Hello";  // ✅ 5 letters + 1 for \\0
\`\`\`

> **A string of N characters needs an array of size N+1.**

---

### ⚠️ Common Confusion: char vs string

\`\`\`c
char ch = 'A';           // single character — uses single quotes
char str[] = "A";        // string with one character — uses double quotes

// In memory:
// ch:  just 'A' (1 byte)
// str: 'A' '\\0' (2 bytes!)
\`\`\`

> **Single quotes = one character. Double quotes = string (auto adds \\0).**


## 2. String Input/Output

### Output with \`printf\`

\`\`\`c
char name[] = "Salah";
printf("%s\\n", name);           // Salah
printf("Hello, %s!\\n", name);   // Hello, Salah!
\`\`\`

---

### Input

#### 1. \`scanf("%s", name)\` — Simple but LIMITED

\`\`\`c
char name[50];
scanf("%s", name);   // no & needed — array is already an address!
\`\`\`

> **Problem:** \`scanf("%s")\` stops at the first **space**.

\`\`\`
Input:  "Ahmed Ali"
Result: name = "Ahmed"     ← "Ali" is lost!
\`\`\`

#### 2. \`scanf("%[^\\n]", name)\` — Reads until Enter

\`\`\`c
char name[50];
scanf("%[^\\n]", name);   // reads everything until newline
\`\`\`

\`\`\`
Input:  "Ahmed Ali"
Result: name = "Ahmed Ali"    ← works! ✅
\`\`\`

> \`%[^\\n]\` means: "read every character EXCEPT newline." The \`^\` means NOT.

<div class="danger-box">

#### 3. \`gets(name)\` — NEVER USE THIS ☠️

\`\`\`c
char name[10];
gets(name);    // reads entire line... with NO size limit!
\`\`\`

**If the user types 100 characters into a 10-char buffer → BUFFER OVERFLOW → crash or hack.**

\`gets\` was so dangerous it was **removed from the C standard** in C11. Never use it. Ever.

</div>

#### 4. \`fgets(name, size, stdin)\` — The SAFE way ✅

\`\`\`c
char name[50];
fgets(name, 50, stdin);    // reads at most 49 chars + \\0
\`\`\`

\`\`\`
Input:  "Ahmed Ali"
Result: name = "Ahmed Ali\\n"   ← includes the newline!
\`\`\`

### Comparison Table

| Method | Reads spaces? | Safe? | Keeps \\n? |
|---|---|---|---|
| \`scanf("%s")\` | ❌ No | ❌ No limit | No |
| \`scanf("%[^\\n]")\` | ✅ Yes | ❌ No limit | No |
| \`gets()\` | ✅ Yes | ☠️ NEVER USE | No |
| \`fgets()\` | ✅ Yes | ✅ Has limit | ⚠️ Yes |

> **Rule of thumb:** Use \`fgets\` for real programs. Use \`scanf\` for quick exercises.

---

## 3. String Functions — \`#include <string.h>\`

| Function | Signature | What it does |
|---|---|---|
| \`strlen\` | \`strlen(str)\` | Returns number of characters (not counting \`\\0\`) |
| \`strcpy\` | \`strcpy(dest, src)\` | Copies \`src\` into \`dest\` |
| \`strncpy\` | \`strncpy(dest, src, n)\` | Copies at most \`n\` chars — **must add \`\\0\` manually** |
| \`strcat\` | \`strcat(dest, src)\` | Appends \`src\` to the end of \`dest\` |
| \`strncat\` | \`strncat(dest, src, n)\` | Appends at most \`n\` chars — adds \`\\0\` automatically |
| \`strcmp\` | \`strcmp(str1, str2)\` | Returns \`0\` if equal, \`< 0\` if str1 < str2, \`> 0\` if str1 > str2 |
| \`strncpy\`* | \`strncpy(dest, src+i, n)\` | Extract substring starting at index \`i\` |


---

### \`strlen\` — How long is the string?

\`\`\`c
char name[] = "Hello";
int len = strlen(name);    // 5 (does NOT count \\0)
\`\`\`

\`\`\`
'H' 'e' 'l' 'l' 'o' '\\0'
 1   2   3   4   5   STOP    → strlen = 5
\`\`\`

> **\`strlen\` counts characters until it hits \`\\0\`. It does NOT count the \`\\0\` itself.**

> **\`strlen\` vs \`sizeof\`:**

\`\`\`c
char name[] = "Hello";
printf("strlen: %lu\\n", strlen(name));  // 5 (characters only)
printf("sizeof: %lu\\n", sizeof(name));  // 6 (includes \\0)
\`\`\`

---

### \`strcpy\` — Copy a string

> **You CANNOT copy strings with \`=\` in C.**

\`\`\`c
char a[] = "Hello";
char b[20];
b = a;           // ❌ COMPILE ERROR! Arrays can't be assigned
strcpy(b, a);    // ✅ copies "Hello" into b
\`\`\`

\`\`\`c
strcpy(destination, source);    // copies source INTO destination
\`\`\`

> **Danger:** If destination is too small → buffer overflow!

\`\`\`c
char small[3];
strcpy(small, "Hello");   // ❌ OVERFLOW! "Hello" needs 6 bytes, small has 3
\`\`\`

### \`strncpy\` — Safer copy with limit

\`\`\`c
char dest[10];
strncpy(dest, "Hello World", 9);   // copies at most 9 chars
dest[9] = '\\0';                     // MUST manually add \\0!
\`\`\`

> **\`strncpy\` does NOT guarantee a null terminator!** Always add \`\\0\` manually after using it.

---

### \`strcat\` — Concatenate (join) strings

\`\`\`c
char greeting[50] = "Hello";
strcat(greeting, " ");
strcat(greeting, "World!");
printf("%s\\n", greeting);    // Hello World!
\`\`\`

\`\`\`c
strcat(destination, source);   // appends source to END of destination
\`\`\`

\`\`\`
BEFORE strcat:  greeting = "Hello\\0"
AFTER  strcat:  greeting = "Hello World!\\0"
                                ↑ \\0 moved to the end
\`\`\`

> **Make sure destination has enough space for BOTH strings + \\0!**

### \`strncat\` — Safer concatenation with limit

\`\`\`c
char dest[15] = "Hello";
strncat(dest, " World!!!!!", 6);   // appends at most 6 chars
printf("%s\\n", dest);              // Hello World
\`\`\`

> **Unlike \`strncpy\`, \`strncat\` DOES add \`\\0\` automatically.** One less gotcha.

---

### \`strcmp\` — Compare strings

> **You CANNOT compare strings with \`==\` in C.**

\`\`\`c
char a[] = "Hello";
char b[] = "Hello";

if (a == b) { }          // ❌ WRONG — compares ADDRESSES, not content
if (strcmp(a, b) == 0) { }  // ✅ CORRECT — compares actual characters
\`\`\`

\`\`\`c
int result = strcmp(str1, str2);
\`\`\`

| Return value | Meaning |
|---|---|
| \`0\` | Strings are **equal** |
| \`< 0\` (negative) | str1 comes **before** str2 (alphabetically) |
| \`> 0\` (positive) | str1 comes **after** str2 (alphabetically) |

\`\`\`c
strcmp("apple", "apple")    // returns 0  (equal)
strcmp("apple", "banana")   // returns < 0  (a before b)
strcmp("banana", "apple")   // returns > 0  (b after a)
strcmp("Apple", "apple")    // returns < 0  ('A' = 65, 'a' = 97)
\`\`\`

> **\`strcmp\` is CASE-SENSITIVE.** Uppercase letters have smaller ASCII values than lowercase. So "Apple" < "apple".

---


## 4. 2D Arrays of Strings

Each row is a separate string:

\`\`\`c
char names[4][20] = {
    "Ahmed",
    "Sara",
    "Omar",
    "Lina"
};
\`\`\`

\`\`\`
         [0][1][2][3][4]...[19]
names[0]: A  h  m  e  d  \\0 ...
names[1]: S  a  r  a  \\0  ...
names[2]: O  m  a  r  \\0  ...
names[3]: L  i  n  a  \\0  ...
\`\`\`

> **\`names[i]\` is a string.** You can use it with \`printf\`, \`strcmp\`, \`strcpy\`, etc.

\`\`\`c
// Print all names
for (int i = 0; i < 4; i++) {
    printf("%s\\n", names[i]);
}

// Find a name
for (int i = 0; i < 4; i++) {
    if (strcmp(names[i], "Omar") == 0) {
        printf("Found Omar at index %d\\n", i);
    }
}
\`\`\`

---

## 5. Character Functions — \`#include <ctype.h>\`

These work on **single characters**, not strings.

### Classification Functions

\`\`\`c
char ch = 'A';

isalpha(ch)    // is it a letter?        → TRUE for 'A'
isdigit(ch)    // is it a digit (0-9)?   → FALSE for 'A'
islower(ch)    // is it lowercase?       → FALSE for 'A'
isupper(ch)    // is it uppercase?       → TRUE for 'A'
isspace(ch)    // is it whitespace?      → FALSE for 'A'
ispunct(ch)    // is it punctuation?     → FALSE for 'A'
\`\`\`

> These return **non-zero (true)** or **0 (false)**.

### Conversion Functions

\`\`\`c
char lower = tolower('A');    // 'a'
char upper = toupper('z');    // 'Z'
\`\`\`

### Example: Convert string to uppercase

\`\`\`c
char msg[] = "Hello World";
for (int i = 0; i < strlen(msg); i++) {
    msg[i] = toupper(msg[i]);
}
printf("%s\\n", msg);    // HELLO WORLD
\`\`\`


## 6. Character I/O: \`getchar\`, \`putchar\`

### \`getchar()\` — Read ONE character from keyboard

\`\`\`c
printf("Press a key: ");
char ch = getchar();
printf("You pressed: %c\\n", ch);
\`\`\`

### \`putchar()\` — Print ONE character

\`\`\`c
putchar('A');       // prints A
putchar('\\n');      // prints newline
\`\`\`

### Example: Read and echo until Enter

\`\`\`c
char ch;
printf("Type something: ");
while ((ch = getchar()) != '\\n') {
    putchar(toupper(ch));    // echo each char as uppercase
}
putchar('\\n');
\`\`\`

\`\`\`
Input:  hello world
Output: HELLO WORLD
\`\`\`

---

## 7. Common Mistakes Summary

\`\`\`c
// ❌ MISTAKE 1: Comparing strings with ==
if (name == "Ahmed")  { }          // WRONG — compares addresses
if (strcmp(name, "Ahmed") == 0) { } // ✅ CORRECT

// ❌ MISTAKE 2: Copying strings with =
char dest[20];
dest = "Hello";                     // WRONG — can't assign arrays
strcpy(dest, "Hello");              // ✅ CORRECT

// ❌ MISTAKE 3: Forgetting \\0 space
char name[5] = "Hello";            // ❌ no room for \\0
char name[6] = "Hello";            // ✅

// ❌ MISTAKE 4: Using gets()
gets(name);                         // ☠️ NEVER — buffer overflow
fgets(name, sizeof(name), stdin);   // ✅ SAFE

// ❌ MISTAKE 5: Forgetting \\0 after strncpy
strncpy(dest, src, 10);            // might not have \\0!
dest[10] = '\\0';                    // ✅ always add manually

// ❌ MISTAKE 6: strcat on uninitialized string
char result[50];
strcat(result, "Hello");           // ❌ result has garbage — where does it append?
strcpy(result, "Hello");           // ✅ initialize first, THEN concat

// ❌ MISTAKE 7: Using & with scanf for strings
scanf("%s", &name);                // ❌ unnecessary & (array is already address)
scanf("%s", name);                 // ✅
\`\`\`

void reverseString(char str[]) {
    int left = 0;
    int right = strlen(str) - 1;

    while (left < right) {
        char temp = str[left];
        str[left] = str[right];
        str[right] = temp;
        left++;
        right--;
    }
}

int main() {
    char word[] = "Hello";
    reverseString(word);
    printf("%s\\n", word);    // olleH
    return 0;
}</code></pre>
<p><strong>Same algorithm as reversing an array!</strong> Two pointers walking inward, swapping at each step. Strings are just char arrays — everything you learned before applies.</p>
<pre><code>Step 0: [H][e][l][l][o]   left=0, right=4, swap H↔o
Step 1: [o][e][l][l][H]   left=1, right=3, swap e↔l
Step 2: [o][l][l][e][H]   left=2, right=2, STOP
Result: "olleH"</code></pre>
