# Call by Reference in C

---

## 1. Quick Review: Call by Value

Last week you learned that C passes **copies** of values to functions:

\`\`\`c
void addTen(int x) {
    x = x + 10;
    printf("Inside: x = %d\\n", x);   // 15
}

int main() {
    int num = 5;
    addTen(num);
    printf("Main: num = %d\\n", num);  // still 5!
    return 0;
}
\`\`\`

\`\`\`
Inside: x = 15
Main: num = 5          ← didn't change!
\`\`\`

\`\`\`
Call by Value = I photocopy my paper and give you the COPY.
               You scribble on the copy.
               My original paper is untouched.
\`\`\`

---

## 2. Call by Reference — The Main Event

Instead of passing the **value**, we pass the **address** using pointers.

Now the function can reach the **original variable** and modify it.

\`\`\`c
void addTen(int *x) {          // receives an ADDRESS
    *x = *x + 10;              // go TO that address and change the value
    printf("Inside: *x = %d\\n", *x);   // 15
}

int main() {
    int num = 5;
    addTen(&num);               // pass the ADDRESS of num
    printf("Main: num = %d\\n", num);    // 15! ✅
    return 0;
}
\`\`\`

\`\`\`
Inside: *x = 15
Main: num = 15         ← IT CHANGED! ✅
\`\`\`

\`\`\`
Call by Reference = I give you my HOME ADDRESS.
                    You GO to my house and move the furniture.
                    When I come home, everything is different.
\`\`\`

---

## 3. Side-by-Side: Value vs Reference

### In Memory

#### Call by VALUE:

\`\`\`
main()                      addTen()
┌──────────────┐           ┌──────────────┐
│ num = 5      │  COPY →   │ x = 5        │  ← DIFFERENT box
│ addr: 0x1000 │           │ addr: 0x2000 │
└──────────────┘           └──────────────┘
                           x = x + 10;
                           x = 15  ← only the copy changes

After return:
num = 5  ← UNCHANGED
\`\`\`

#### Call by REFERENCE:

\`\`\`
main()                      addTen()
┌──────────────┐           ┌──────────────┐
│ num = 5      │ ◄──────── │ x = 0x1000   │  ← points to num!
│ addr: 0x1000 │           │ addr: 0x2000 │
└──────────────┘           └──────────────┘
                           *x = *x + 10;
                           goes to 0x1000, changes 5 → 15

After return:
num = 15 ← CHANGED ✅
\`\`\`

### Code Side-by-Side

\`\`\`c
// ═══════════════════════════════════════════════
//  CALL BY VALUE              CALL BY REFERENCE
// ═══════════════════════════════════════════════
void addV(int x) {          void addR(int *x) {
    x = x + 10;                 *x = *x + 10;
}                            }

int main() {                 int main() {
    int n = 5;                   int n = 5;
    addV(n);                     addR(&n);
    printf("%d", n); // 5        printf("%d", n); // 15
}                            }
\`\`\`

| | Call by Value | Call by Reference |
|---|---|---|
| **What's passed** | A copy of the value | The address of the variable |
| **Parameter** | \`int x\` | \`int *x\` |
| **How you call** | \`func(num)\` | \`func(&num)\` |
| **Modify original?** | ❌ No | ✅ Yes |
| **Inside function** | Use \`x\` directly | Use \`*x\` to access |


---

## 4. Arrays and Call by Reference

### The Truth: Arrays Are ALWAYS Passed by Reference

You've been using call by reference since week 2 — you just didn't know it.

\`\`\`c
void fillWithZeros(int arr[], int size) {
    for (int i = 0; i < size; i++) {
        arr[i] = 0;
    }
}

int main() {
    int nums[] = {5, 10, 15, 20};
    fillWithZeros(nums, 4);
    // nums is now {0, 0, 0, 0} — the ORIGINAL changed!
    for (int i = 0; i < 4; i++) printf("%d ", nums[i]);
    return 0;
}
\`\`\`

> **Why?** When you write \`int arr[]\` in a parameter, C secretly converts it to \`int *arr\`. The array name IS already an address. No \`&\` needed!

\`\`\`c
// These three are EXACTLY the same:
void func(int arr[], int size)     // looks like array
void func(int *arr, int size)      // looks like pointer
void func(int arr[100], int size)  // the 100 is ignored!
\`\`\`

### Proof: Array name IS an address

\`\`\`c
int arr[] = {10, 20, 30};
printf("arr     = %p\\n", arr);       // 0x1000
printf("&arr[0] = %p\\n", &arr[0]);   // 0x1000  ← SAME!
\`\`\`

> **That's why you never write \`&arr\` when passing arrays — \`arr\` is already the address.**

---

### Why \`sizeof\` Lies Inside Functions

\`\`\`c
void printSize(int arr[]) {
    printf("Inside function: %lu\\n", sizeof(arr));   // 8 (size of a pointer!)
}

int main() {
    int nums[] = {1, 2, 3, 4, 5};
    printf("In main: %lu\\n", sizeof(nums));           // 20 (5 ints × 4 bytes)
    printSize(nums);
    return 0;
}
\`\`\`

\`\`\`
In main: 20
Inside function: 8
\`\`\`

> **Inside the function, the array has decayed to a pointer.** A pointer is always 8 bytes (on 64-bit systems). The size information is LOST. That's why we ALWAYS pass \`size\` as a separate parameter.

---

### Modifying Arrays Through Functions

#### Example: Scale all elements

\`\`\`c
void scaleArray(int *arr, int size, int factor) {
    for (int i = 0; i < size; i++) {
        arr[i] = arr[i] * factor;    // modifies ORIGINAL
    }
}

int main() {
    int grades[] = {70, 85, 90, 60, 75};
    scaleArray(grades, 5, 2);
    // grades is now {140, 170, 180, 120, 150}
    for (int i = 0; i < 5; i++) printf("%d ", grades[i]);
    return 0;
}
\`\`\`

## 5. Combining Pointers + Arrays

### Pattern 1: Return multiple results from array processing

\`\`\`c
void analyzeArray(int arr[], int size, int *sum, float *avg, int *min, int *max) {
    *sum = 0;
    *min = arr[0];
    *max = arr[0];

    for (int i = 0; i < size; i++) {
        *sum += arr[i];
        if (arr[i] < *min) *min = arr[i];
        if (arr[i] > *max) *max = arr[i];
    }

    *avg = (float)(*sum) / size;
}

int main() {
    int arr[] = {4, 8, 2, 10, 6};
    int sum, min, max;
    float avg;
    analyzeArray(arr, 5, &sum, &avg, &min, &max);
    printf("Sum=%d Avg=%.2f Min=%d Max=%d\\n", sum, avg, min, max);
    // Sum=30 Avg=6.00 Min=2 Max=10
    return 0;
}
\`\`\`

> **ONE function, FOUR results.** The array is passed by reference (automatically). The result variables are passed by reference (using \`&\`).

---

### Pattern 2: Function returns status, pointer returns result

\`\`\`c
int findElement(int arr[], int size, int target, int *index) {
    for (int i = 0; i < size; i++) {
        if (arr[i] == target) {
            *index = i;
            return 1;     // found!
        }
    }
    return 0;             // not found
}

int main() {
    int arr[] = {10, 20, 30, 40, 50};
    int pos;

    if (findElement(arr, 5, 30, &pos)) {
        printf("Found at index %d\\n", pos);    // Found at index 2
    } else {
        printf("Not found\\n");
    }

    if (findElement(arr, 5, 99, &pos)) {
        printf("Found at index %d\\n", pos);
    } else {
        printf("Not found\\n");                 // Not found
    }
    return 0;
}
\`\`\`

> **This pattern is used EVERYWHERE in professional C code.** \`return\` = success/fail. Pointer = actual result.

---

## 6. Decision Guide — When to Use Which

\`\`\`
┌─────────────────────────────────────────────────────────────┐
│                    DECISION GUIDE                           │
├─────────────────────────────────────────────────────────────┤
│                                                             │
│  Does the function need to CHANGE the original variable?    │
│     YES → Call by Reference  (int *x)  func(&var)           │
│     NO  → Call by Value      (int x)   func(var)            │
│                                                             │
│  Does the function need to "return" MORE than one value?    │
│     YES → Use pointers for the extra "returns"              │
│     NO  → Normal return is fine                             │
│                                                             │
│  Are you passing an array?                                  │
│     It's ALWAYS by reference automatically.                 │
│     No & needed — array name IS an address.                 │
│                                                             │
│  Are you passing a single int/float/char?                   │
│     Want to READ only → pass by value    (int x)            │
│     Want to MODIFY    → pass by reference (int *x)          │
│                                                             │
└─────────────────────────────────────────────────────────────┘
\`\`\`

## 7. Common Mistakes

\`\`\`c
// ❌ MISTAKE 1: Forgetting & when calling
int x = 5;
addTen(x);       // WRONG — passing value, not address
addTen(&x);      // ✅ CORRECT

// ❌ MISTAKE 2: Forgetting * in the parameter
void addTen(int x) {    // WRONG — this is call by VALUE
    x = x + 10;
}
void addTen(int *x) {   // ✅ CORRECT — this is call by reference
    *x = *x + 10;
}

// ❌ MISTAKE 3: Forgetting * when accessing
void addTen(int *x) {
    x = x + 10;     // WRONG! Moves the POINTER, not the value
    *x = *x + 10;   // ✅ Dereference to get/set value
}

// ❌ MISTAKE 4: Using & when passing arrays
int arr[] = {1, 2, 3};
func(&arr, 3);     // WRONG! arr is already an address
func(arr, 3);      // ✅ CORRECT

// ❌ MISTAKE 5: (*count)++ vs *count++
(*count)++;     // ✅ increment the VALUE at the address
*count++;       // ❌ increment the POINTER then dereference — NOT what you want
\`\`\`

## 9. Visual Summary

\`\`\`
╔═══════════════════════════════════════════════════════════════╗
║              CALL BY VALUE vs CALL BY REFERENCE               ║
╠═══════════════════════════════════════════════════════════════╣
║                                                               ║
║  VALUE:                      REFERENCE:                       ║
║  void f(int x)               void f(int *x)                  ║
║  call: f(var)                call: f(&var)                    ║
║  gets a COPY                 gets the ADDRESS                 ║
║  original SAFE               original CHANGES                 ║
║                                                               ║
║  ARRAYS:                                                      ║
║  void f(int arr[], int n)    ← ALWAYS by reference            ║
║  call: f(arr, n)             ← no & needed                    ║
║                                                               ║
╠═══════════════════════════════════════════════════════════════╣
║  WHEN TO USE REFERENCE:                                       ║
║  • Function needs to MODIFY the original                      ║
║  • Function needs to "return" MULTIPLE values                 ║
║  • Passing large data (efficiency)                            ║
║  • Arrays (automatic — no choice)                             ║
╚═══════════════════════════════════════════════════════════════╝

## 🔮 Sneak Peek: What's Coming Next Week — Recursion

**A function that calls ITSELF.** That's the whole idea.

\`\`\`c
void countDown(int n) {
    if (n == 0) {
        printf("Go!\\n");
        return;              // STOP here (base case)
    }
    printf("%d...\\n", n);
    countDown(n - 1);        // call MYSELF with a smaller number
}

// countDown(3) prints:
// 3...
// 2...
// 1...
// Go!
\`\`\`

**Two rules you'll need to remember:**
1. **Base case** — when to STOP (without this → infinite loop → crash)
2. **Recursive case** — call yourself with a SMALLER problem

**Classic example — factorial:**

\`\`\`
5! = 5 × 4 × 3 × 2 × 1 = 120

Or think of it as:
5! = 5 × 4!    ← calling itself with a smaller problem!
\`\`\`

\`\`\`c
int factorial(int n) {
    if (n <= 1) return 1;           // base case
    return n * factorial(n - 1);    // recursive case
}
\`\`\`

**That's all for now.** Next week we'll go deep into recursion, trace how it works step by step, and solve some cool problems with it. Come prepared!
