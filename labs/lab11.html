# Searching & Sorting in C

---

## 1. Searching Techniques

> **Goal:** find the index (position) of a target value inside an array, or return \`-1\` if it does not exist.

---

### Linear Search (Sequential Search)

**Idea:** start at index 0 and check each element one by one until you either find the target or reach the end of the array. No special structure is required — the array can be sorted or unsorted.

**Example:** searching \`[5, 3, 8, 1, 9, 2]\` for \`8\` checks indices 0, 1, and 2, then returns index \`2\`.

\`\`\`c
int linearSearch(int arr[], int n, int target) {
    for (int i = 0; i < n; i++) {
        if (arr[i] == target) {
            return i;    // found — return index
        }
    }
    return -1;           // not found
}
\`\`\`

> **Works on ANY array** — sorted or unsorted.
> **Worst case:** n comparisons (target is at the end or not there at all).

---

### Binary Search

**Idea:** the array **must be sorted**. Maintain a window of possible indices using \`low\` and \`high\`. Each step looks at the middle index of that window:

- If the middle value equals the target → found.
- If the target is larger → discard the left half (\`low = mid + 1\`).
- If the target is smaller → discard the right half (\`high = mid - 1\`).

The window shrinks by about half each time, which is why binary search is much faster than linear search on large sorted arrays.

**Example:** searching \`[1, 3, 5, 7, 9, 11, 13]\` for \`9\` compares against \`7\` (too small, move right), then \`11\` (too large, move left), then \`9\` at index 4.

\`\`\`c
int binarySearch(int arr[], int n, int target) {
    int low = 0, high = n - 1;

    while (low <= high) {
        int mid = (low + high) / 2;

        if (arr[mid] == target) {
            return mid;          // found
        } else if (arr[mid] < target) {
            low = mid + 1;       // go right
        } else {
            high = mid - 1;      // go left
        }
    }
    return -1;                   // not found
}
\`\`\`

> **Requires a sorted array.**
> **Worst case:** roughly log₂(n) comparisons — dramatically faster than linear search for large arrays.

---

### Comparison Table

Pick the search that matches your data: linear search needs no preparation; binary search needs sorted data but scales much better as arrays grow.

| | Linear Search | Binary Search |
|---|---|---|
| Works on unsorted? | ✅ Yes | ❌ No — must be sorted |
| Max comparisons | n | ~log₂(n) |
| Best for | Small / unsorted data | Large sorted data |

---

## 2. Sorting Techniques

> **Goal:** rearrange array elements into ascending or descending order.

---

### Bubble Sort

**Idea (classic):** repeatedly compare **adjacent** elements and swap them if they are out of order. After each outer pass, the largest remaining value moves to the end.

- **Ascending:** swap when \`arr[j] > arr[j + 1]\` (use \`>\`)
- **Descending:** swap when \`arr[j] < arr[j + 1]\` (use \`<\`)

\`\`\`c
void bubbleSort(int arr[], int n) {
    int i, j, temp;

    for (i = 0; i < n - 1; i++) {
        for (j = 0; j < n - i - 1; j++) {
            if (arr[j] > arr[j + 1]) {
                temp         = arr[j];
                arr[j]       = arr[j + 1];
                arr[j + 1] = temp;
            }
        }
    }
}
\`\`\`

> **Key observation:** the inner limit \`n - i - 1\` shrinks each pass because the last \`i\` elements are already in their final positions.


### Selection Sort

**Idea:** split the array into a sorted part (left) and an unsorted part (right). For each position \`i\`, assume \`arr[i]\` is the minimum, scan the rest with \`j\` to find the real minimum, then swap it into place.

Classic bubble sort swaps **neighbors** whenever they are out of order; selection sort **finds the minimum** in the unsorted range, then moves it to position \`i\`.

\`\`\`c
void selectionSort(int arr[], int n) {
    for (int i = 0; i < n - 1; i++) {

        /* assume the current position holds the minimum */
        int min_idx = i;

        /* scan the unsorted portion for the actual minimum */
        for (int j = i + 1; j < n; j++) {
            if (arr[j] < arr[min_idx]) {
                min_idx = j;
            }
        }

        /* move minimum to its correct position */
        int temp = arr[i];
        arr[i] = arr[min_idx];
        arr[min_idx] = temp;
    }
}
\`\`\`

**Example** on \`[64, 25, 12, 22, 11]\`: when \`i = 0\`, the inner loop finds \`11\` at index \`4\`, swaps with \`64\`, and the array becomes \`[11, 25, 12, 22, 64]\`.

> The array is sorted **in place** — no separate output array is needed.
> Each outer step places the next smallest value at index \`i\`.

---

### Sorting Comparison Table

Both algorithms are simple O(n²) sorts suitable for small arrays or learning purposes. Classic bubble sort uses adjacent swaps; selection sort scans for the minimum, then places it in one swap. Use the table below to choose based on how many swaps you can afford and whether **stability** (keeping equal elements in their original order) matters.

| | Bubble Sort | Selection Sort |
|---|---|---|
| Comparisons | ~n²/2 | ~n²/2 |
| Swaps | Up to ~n²/2 | n−1 swap steps |
| Stable? | ✅ Yes | ❌ No |
| Best for | Teaching standard bubble sort | Minimizing swaps |
