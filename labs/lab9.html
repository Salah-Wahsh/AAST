  # 🔄 Recursion in C — Lab Session
  
  > **Welcome back!** 👋 Last week you learned how to pass variables by reference. This week, we're learning something that might sound scary at first — **recursion**. But here's a secret: if you can write a function and you understand \`if/else\`, you already have everything you need. Let's discover it together, one small step at a time.
  
  ---
  
  ## 🧠 Before We Start: A Mindset Shift
  
  You already know how to solve problems with **loops**. Recursion is just a **different way** to repeat things.
  
  > **Loop thinking:** "I'll keep going step by step until I'm done."
  >
  > **Recursive thinking:** "I'll do a tiny bit of work, then ask someone else to handle the rest."
  
  That "someone else"? It's **the same function** — calling itself with a **smaller problem**.
  
  That's it. That's recursion. Let's see it in action.
  
  
  ## Problem 1: Countdown 🚀
  
  ### The Problem
  
  Write a function that counts down from \`n\` to 1, then prints "Go!"
  
  \`\`\`
  countDown(5) should print:
  5
  4
  3
  2
  1
  Go!
  \`\`\`
  
  ### Let's Think Together 🤔
  
  Before writing ANY code, let's answer three questions:
  
  **Question 1:** What's the **simplest version** of this problem? What if \`n\` is 0?
  
  > If \`n\` is 0, we're done — just print "Go!" This is our **base case** (the stopping point).
  
  **Question 2:** If \`n\` is NOT 0, what's the **tiny bit of work** we can do?
  
  > Print the current number \`n\`.
  
  **Question 3:** After doing that tiny bit of work, what's the **remaining problem**?
  
  > Count down from \`n - 1\`. That's a **smaller version** of the same problem!
  
  ### The Pattern
  
  \`\`\`
  countDown(5):
    print 5, then countDown(4)
      print 4, then countDown(3)
        print 3, then countDown(2)
          print 2, then countDown(1)
            print 1, then countDown(0)
              print "Go!" and STOP ← base case!
  \`\`\`
  
  ### The Code
  
  \`\`\`c
  #include <stdio.h>
  
  void countDown(int n) {
      // Base case: when do we stop?
      if (n == 0) {
          printf("Go!\\n");
          return;              // STOP — don't call yourself again
      }
  
      // Recursive case: do a little work, then recurse
      printf("%d\\n", n);       // print current number
      countDown(n - 1);        // handle the rest (smaller problem)
  }
  
  int main() {
      countDown(5);
      return 0;
  }
  \`\`\`
  
  \`\`\`
  Output:
  5
  4
  3
  2
  1
  Go!
  \`\`\`
  
  ### 🔑 Key Takeaway
  
  Every recursive function needs exactly **two things**:
  1. **Base case** — when to STOP (without this → infinite calls → crash 💥)
  2. **Recursive case** — do a little work, then call yourself with a **smaller** problem
  
  > 💡 Think of it like Russian nesting dolls 🪆 — each doll opens to reveal a smaller doll inside, until you reach the tiniest one (the base case).
  
  ---
  
  ### 🧪 Quick Practice 1
  
  **Modify the countdown to count UP instead:**
  
  \`\`\`
  countUp(5) should print:
  1
  2
  3
  4
  5
  \`\`\`
  
  **💡 Hints:**
  - The base case is the same (stop when \`n == 0\`).
  - The trick: should you print **before** or **after** the recursive call?
  - With countdown, we printed first, then recursed. What if you **recurse first**, then print?
  
  <!--ANSWER_V1-->

  ## Problem 2: Factorial ✖️
  
  ### The Problem
  
  Calculate \`n!\` (n factorial).
  
  \`\`\`
  5! = 5 × 4 × 3 × 2 × 1 = 120
  3! = 3 × 2 × 1 = 6
  1! = 1
  0! = 1  (by definition)
  \`\`\`
  
  ### Let's Think Together 🤔
  
  You already know how to do this with a loop:
  
  \`\`\`c
  // The loop version you already know
  int factorial_loop(int n) {
      int result = 1;
      for (int i = 1; i <= n; i++) {
          result *= i;
      }
      return result;
  }
  \`\`\`
  
  Now let's think about it **recursively**. Ask yourself:
  
  **Question 1:** What's the simplest case where you know the answer immediately?
  
  > \`0! = 1\` and \`1! = 1\`. No calculation needed. That's our **base case**.
  
  **Question 2:** Can you express \`5!\` in terms of a **smaller** factorial?
  
  > \`5! = 5 × 4!\` — Yes! We do ONE multiplication, then ask "what's 4!?"
  
  **Question 3:** Does this keep getting smaller until it hits the base case?
  
  > \`5! = 5 × 4! = 5 × 4 × 3! = 5 × 4 × 3 × 2! = 5 × 4 × 3 × 2 × 1! = 5 × 4 × 3 × 2 × 1\` ✅
  
  ### Tracing Through the Execution
  
  Let's watch \`factorial(4)\` step by step:
  
  \`\`\`
  factorial(4)
    → return 4 * factorial(3)
                  factorial(3)
                    → return 3 * factorial(2)
                                  factorial(2)
                                    → return 2 * factorial(1)
                                                  factorial(1)
                                                    → return 1  ← BASE CASE!
                                    → return 2 * 1 = 2
                    → return 3 * 2 = 6
    → return 4 * 6 = 24 ✅
  \`\`\`
  
  > 📝 Notice the pattern: the function calls go **down** (getting smaller), then the results come back **up** (multiplying as they return).
  
  ### The Code
  
  \`\`\`c
  #include <stdio.h>
  
  int factorial(int n) {
      // Base case
      if (n <= 1) {
          return 1;
      }
  
      // Recursive case: n! = n × (n-1)!
      return n * factorial(n - 1);
  }
  
  int main() {
      printf("5! = %d\\n", factorial(5));   // 120
      printf("3! = %d\\n", factorial(3));   // 6
      printf("0! = %d\\n", factorial(0));   // 1
      return 0;
  }
  \`\`\`
  
  
  ### 🧪 Quick Practice 2
  
  **Write a recursive function \`int sumToN(int n)\` that returns \`1 + 2 + 3 + ... + n\`:**
  
  \`\`\`c
  int main() {
      printf("%d\\n", sumToN(5));   // 15 (1+2+3+4+5)
      printf("%d\\n", sumToN(10));  // 55
      printf("%d\\n", sumToN(1));   // 1
      return 0;
  }
  \`\`\`
  
  **💡 Hints:**
  - Base case: What is \`sumToN(1)\`? Just 1.
  - Recursive case: \`sumToN(5) = 5 + sumToN(4)\`. See the pattern?
  - It's almost identical to factorial — just change \`*\` to \`+\`.
  
  <!--ANSWER_V2-->

  ## Solve those problems on your own
  
  ### Problem 1: Product from 1 to n (Loop + Recursion) 🔄
  
  Write BOTH:
  - \`productLoop(int n)\`
  - \`productRec(int n)\`

  \`\`\`

      return 0;
  }
  \`\`\`

  - Base case for recursion: \`n <= 1\` returns 1.
  - Recursive idea: \`n * productRec(n - 1)\`.

  }
  \`\`\`

  - Recursive idea: \`a + multiply(a, b - 1)\`

  ### Problem 4: All Positive Check 🔢

      printf("%d\\n", allPositive(b, 5));  // 0

  }
  \`\`\`
  
  **💡 Hints:**
  - Base case: \`size == 0\` returns 1
  - If last element is <= 0, return 0 immediately
  - Else recurse on \`size - 1\`

  ## 🧩 Summary: The Recursion Recipe
  
  Every time you face a recursive problem, ask these **three questions**:
  
  \`\`\`
  ╔═══════════════════════════════════════════════════════════════╗
  ║                  THE RECURSION RECIPE 🍳                     ║
  ╠═══════════════════════════════════════════════════════════════╣
  ║                                                               ║
  ║  1. What is the SIMPLEST case? (Base case)                    ║
  ║     → When can I answer IMMEDIATELY without recursion?        ║
  ║     → Examples: n == 0, n == 1, empty array, single element   ║
  ║                                                               ║
  ║  2. How do I make the problem SMALLER? (Recursive case)       ║
  ║     → n - 1, size - 1, left + 1, right - 1, n / 10           ║
  ║     → The problem MUST get closer to the base case!           ║
  ║                                                               ║
  ║  3. How do I COMBINE my tiny work with the recursive result?  ║
  ║     → Add, multiply, compare, append, print...                ║
  ║     → "My work" + "result from the smaller problem"           ║
  ║                                                               ║
  ╠═══════════════════════════════════════════════════════════════╣
  ║                                                               ║
  ║  TRUST THE FUNCTION!                                          ║
  ║  Don't trace every level in your head.                        ║
  ║  Assume the recursive call works correctly.                   ║
  ║  Just handle YOUR level.                                      ║
  ║                                                               ║
  ╚═══════════════════════════════════════════════════════════════╝
  \`\`\`
  
  ---
  
  ## ⚠️ Common Recursion Mistakes
  
  ### Mistake 1: Forgetting the base case
  \`\`\`c
  int factorial(int n) {
      return n * factorial(n - 1);  // ❌ Never stops! Stack overflow!
  }
  \`\`\`
  ✅ **Always have a base case that returns WITHOUT calling itself.**
  
  ### Mistake 2: Base case doesn't match the shrinking
  \`\`\`c
  int factorial(int n) {
      if (n == 0) return 1;         // base case checks n == 0
      return n * factorial(n - 2);  // ❌ but we subtract 2! Skips 0 for odd n!
  }
  \`\`\`
  ✅ **Make sure the recursive step actually reaches the base case.**
  
  ### Mistake 3: Not returning the recursive result
  \`\`\`c
  int factorial(int n) {
      if (n <= 1) return 1;
      factorial(n - 1);             // ❌ Forgot 'return'! Result is lost!
  }
  \`\`\`
  ✅ **If the function returns a value, \`return\` the recursive call.**
  
  ### Mistake 4: Modifying and recursing on the same variable
  \`\`\`c
  void printDigits(int n) {
      n = n / 10;                   // ❌ Modified n before using n % 10
      printf("%d\\n", n % 10);
      printDigits(n);
  }
  \`\`\`
  ✅ **Be careful about the order of operations.**
  

  
  `;

      // Base case: only one element — it's the max
      if (size == 1) {
          return arr[0];
      }
  
      // Recursive case: get the max of the rest
      int maxOfRest = findMax(arr, size - 1);
  
      // Compare last element with the max of the rest
      if (arr[size - 1] > maxOfRest) {
          return arr[size - 1];
      } else {
          return maxOfRest;
      }

          btn.classList.remove("revealed");
        } else {
          block.classList.add("visible");
          btn.textContent = "▼ Hide hints 💡";
          btn.classList.add("revealed");
          if (window.Prism && typeof Prism.highlightAllUnder === "function") {
            Prism.highlightAllUnder(block);
          }
        }
      }

      window.toggleAnswer = toggleAnswer;
    </script>
  </body>
</html>
